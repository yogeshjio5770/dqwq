<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AutoHeal App</title><link rel="icon" type="image/x-icon" href="https://cdn-icons-png.flaticon.com/512/25/25694.png"><script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin=""></script><script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin=""></script><script src="https://unpkg.com/@babel/standalone/babel.min.js"></script><style>body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #0f172a; color: white; } .glass { background: rgba(255, 255, 255, 0.1); border-radius: 16px; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); border: 1px solid rgba(255, 255, 255, 0.3); } .glass:hover { box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2); } .form { display: flex; flex-direction: column; align-items: center; padding: 20px; } .form input { padding: 10px; margin: 10px; border: none; border-radius: 10px; } .form button { padding: 10px; margin: 10px; border: none; border-radius: 10px; background-color: #4CAF50; color: white; cursor: pointer; } .form button:hover { background-color: #3e8e41; }</style></head><body><div id="root"></div><script type="text/babel">const { useState } = React;const App = () => { const [currentPage, setCurrentPage] = useState('login'); const [email, setEmail] = useState(''); const [password, setPassword] = useState(''); const [users, setUsers] = useState([]); const handleSignup = () => { const user = { email, password }; setUsers([...users, user]); setCurrentPage('login'); }; const handleLogin = () => { const user = users.find((u) => u.email === email && u.password === password); if (user) { setCurrentPage('home'); } else { alert('Invalid email or password'); } }; const handlePageChange = (page) => { setCurrentPage(page); }; return ( <div className="glass" style={{ width: '300px', height: '400px' }}> {currentPage === 'login' && ( <div className="form"> <h2>Login</h2> <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="Email" /> <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="Password" /> <button onClick={handleLogin}>Login</button> <p>Don't have an account? <span style={{ cursor: 'pointer' }} onClick={() => handlePageChange('signup')}>Sign up</span></p> </div> )} {currentPage === 'signup' && ( <div className="form"> <h2>Sign up</h2> <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="Email" /> <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="Password" /> <button onClick={handleSignup}>Sign up</button> <p>Already have an account? <span style={{ cursor: 'pointer' }} onClick={() => handlePageChange('login')}>Login</span></p> </div> )} {currentPage === 'home' && ( <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '20px' }}> <h2>Welcome to AutoHeal!</h2> <p>You are now logged in.</p> </div> )} </div> );};ReactDOM.render(<App />, document.getElementById('root'));</script></body></html>
